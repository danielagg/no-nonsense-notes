name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rust-check:
    name: Rust check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features
      - run: cargo check --no-default-features --target wasm32-unknown-unknown -p no-nonsense-notes-wasm

  rust-test:
    name: Rust test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  wasm-build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo install wasm-pack
      - run: wasm-pack build --target web --out-dir pkg crates/wasm
      - run: wasm-pack test --headless --chrome crates/wasm --no-default-features
      - uses: actions/upload-artifact@v7
        with:
          name: wasm-pkg
          path: crates/wasm/pkg/

  web-build:
    name: Web build
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: wasm-pkg
          path: apps/web/src/lib/wasm-pkg/
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run test
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: apps/web/dist/

  deploy-render:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    needs: [rust-check, rust-test, web-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl --fail-with-body --silent --show-error --request POST "$RENDER_DEPLOY_HOOK"

  deploy:
    name: Deploy web app to Vercel
    runs-on: ubuntu-latest
    needs: [rust-check, rust-test, web-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: wasm-pkg
          path: apps/web/src/lib/wasm-pkg/
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - name: Install Vercel CLI
        run: npm install --global vercel@55.0.0
      - name: Validate production configuration
        run: |
          if [[ -z "$VITE_API_URL" ]]; then
            echo "::error::The VITE_API_URL repository secret is not set"
            exit 1
          fi
      - name: Pull Vercel production configuration
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build for Vercel
        run: vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy to Vercel
        id: deploy
        run: |
          deployment_url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
