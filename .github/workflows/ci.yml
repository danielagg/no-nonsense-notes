name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rust-check:
    name: Rust check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features
      - run: cargo check --no-default-features --target wasm32-unknown-unknown -p no-nonsense-notes-wasm

  rust-test:
    name: Rust test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  wasm-build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo install wasm-pack
      - run: wasm-pack build --target web --out-dir pkg crates/wasm
      - run: wasm-pack test --headless --chrome crates/wasm --no-default-features
      - uses: actions/upload-artifact@v7
        with:
          name: wasm-pkg
          path: crates/wasm/pkg/

  web-build:
    name: Web build
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: wasm-pkg
          path: apps/web/src/lib/wasm-pkg/
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run test
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: apps/web/dist/

  android-build:
    name: Android production APK
    runs-on: ubuntu-latest
    env:
      ANDROID_PRODUCTION_API_URL: https://no-nonsense-notes.onrender.com
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2

      - name: Configure release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.NNN_ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.NNN_ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.NNN_ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.NNN_ANDROID_KEY_PASSWORD }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" != "push" || "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Pull request build: release signing is intentionally disabled."
            exit 0
          fi

          configured=0
          for value in "$KEYSTORE_BASE64" "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD"; do
            [[ -n "$value" ]] && configured=$((configured + 1))
          done

          if [[ "$configured" == 0 ]]; then
            echo "::warning::Android signing secrets are not configured; the production APK will be unsigned."
            exit 0
          fi
          if [[ "$configured" != 4 ]]; then
            echo "::error::Android release signing is partially configured. Set all four NNN_ANDROID_* secrets."
            exit 1
          fi

          keystore="$RUNNER_TEMP/no-nonsense-notes-release.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore"
          echo "NNN_ANDROID_KEYSTORE=$keystore" >> "$GITHUB_ENV"
          echo "NNN_ANDROID_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "NNN_ANDROID_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "NNN_ANDROID_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build production release APK
        run: ./gradlew assembleRelease -PreleaseApiUrl="$ANDROID_PRODUCTION_API_URL"
        working-directory: apps/android

      - name: Verify production API URL
        run: |
          build_config="app/build/generated/source/buildConfig/release/app/nononsense/notes/BuildConfig.java"
          grep -F "API_URL = \"$ANDROID_PRODUCTION_API_URL\"" "$build_config"
        working-directory: apps/android

      - name: Prepare production artifact
        run: |
          mkdir -p app/build/distributions
          if [[ -f app/build/outputs/apk/release/app-release.apk ]]; then
            output="app/build/distributions/no-nonsense-notes-production-signed.apk"
            cp app/build/outputs/apk/release/app-release.apk "$output"
          else
            output="app/build/distributions/no-nonsense-notes-production-unsigned.apk"
            cp app/build/outputs/apk/release/app-release-unsigned.apk "$output"
          fi
          sha256sum "$output" > "$output.sha256"
        working-directory: apps/android

      - uses: actions/upload-artifact@v7
        with:
          name: android-production-apk
          path: apps/android/app/build/distributions/
          if-no-files-found: error

  deploy-render:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    needs: [rust-check, rust-test, web-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl --fail-with-body --silent --show-error --request POST "$RENDER_DEPLOY_HOOK"

  deploy:
    name: Deploy web app to Vercel
    runs-on: ubuntu-latest
    needs: [rust-check, rust-test, web-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: wasm-pkg
          path: apps/web/src/lib/wasm-pkg/
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - name: Install Vercel CLI
        run: npm install --global vercel@55.0.0
      - name: Validate production configuration
        run: |
          if [[ -z "$VITE_API_URL" ]]; then
            echo "::error::The VITE_API_URL repository secret is not set"
            exit 1
          fi
      - name: Pull Vercel production configuration
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build for Vercel
        run: vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy to Vercel
        id: deploy
        run: |
          deployment_url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
